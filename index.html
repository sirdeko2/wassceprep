<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free WASSCE prep for every Liberian student — practice questions, mock exams, AI marking, and past papers." />
    <meta name="theme-color" content="#002868" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WASSCEPrep" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icon (fallback for iOS) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>WASSCEPrep — Liberia WASSCE Exam Prep</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('WASSCEPrep SW registered:', reg.scope)
              // Listen for offline sync messages from the SW
              navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data?.type === 'SYNC_READY') {
                  window.dispatchEvent(new CustomEvent('wassce-sync-ready'))
                }
              })
            })
            .catch(err => console.warn('SW registration failed:', err))
        })
      }
    </script>
  </body>
</html>
